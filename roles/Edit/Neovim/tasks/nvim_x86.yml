---

# neovim for x86
#
# on x86 we use the pre-compiled appimage

- name: get appimage file
  get_url: 
    url:  "https://github.com/neovim/neovim/releases/download/{{nvim_vsn}}/nvim-linux-x86_64.appimage"
    dest: "{{pkg_dir}}/nvim/nvim-{{host_arch}}-{{nvim_vsn}}.appimage"
    mode: "a+rx"
    group: "{{gen_user}}"
    owner: "{{gen_user}}"

- name: create executable symlink
  file: 
    src:   "{{pkg_dir}}/nvim/nvim-{{host_arch}}-{{nvim_vsn}}.appimage"
    dest:  "{{symlink_dir}}/nvim"
    state: link
    force: yes
    mode:  "a+rx"

