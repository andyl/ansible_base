---

# sops
# install sops 

- name: create pkg dir
  file: 
    path: "{{pkg_dir}}/sops"
    state: directory 
    group: "{{gen_user}}" 
    owner: "{{gen_user}}"

- name: get deb file
  become: false
  get_url: 
    url:  "https://github.com/mozilla/sops/releases/download/v{{sops_version}}/sops_{{sops_version}}_amd64.deb"
    dest: "{{pkg_dir}}/sops/sops_{{sops_version}}_amd64.deb"
    force: no
    validate_certs: false

- name: install package
  become: true
  apt: 
    deb: "{{pkg_dir}}/sops/sops_{{sops_version}}_amd64.deb"
