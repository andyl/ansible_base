---

# browserpass 
# https://github.com/browserpass/browserpass-native 

- name: create bpn pkg dir
  file: 
    path: "{{pkg_dir}}/bpn/{{bpn_vsn}}"
    state: directory 
    group: "{{gen_user}}" 
    owner: "{{gen_user}}"

- name: get bpn tar file
  become: false
  get_url: 
    url:  "https://github.com/browserpass/browserpass-native/releases/download/v{{bpn_vsn}}/browserpass-linux64-{{bpn_vsn}}.tar.gz"
    dest: "{{pkg_dir}}/bpn/{{bpn_vsn}}/browserpassnative_{{bpn_vsn}}.tar.gz"
    force: no
    validate_certs: false

- name: expand bpn tar file
  unarchive:
    src:  "{{pkg_dir}}/bpn/{{bpn_vsn}}/browserpassnative_{{bpn_vsn}}.tar.gz" 
    dest: "{{pkg_dir}}/bpn/{{bpn_vsn}}/" 
    group: "{{gen_user}}" 
    owner: "{{gen_user}}"
    remote_src: true
    validate_certs: false
    
# install the package. refer to the documentation:
# https://github.com/browserpass/browserpass-native#install-manually
#
# Version-aware idempotency: stat the installed binary, parse its
# `-version` output, and compare against {{bpn_vsn}}. Configure+install
# only run when the binary is missing or reports a different version,
# so bumping bpn_vsn in vars/main.yml triggers a real upgrade.

- name: stat installed bpn binary
  stat:
    path: /usr/bin/browserpass-linux64
  register: bpn_bin

- name: read installed bpn version
  command: /usr/bin/browserpass-linux64 -version
  register: bpn_installed
  changed_when: false
  failed_when: false
  when: bpn_bin.stat.exists

- name: decide whether bpn needs install
  set_fact:
    bpn_needs_install: "{{ not bpn_bin.stat.exists or bpn_vsn not in (bpn_installed.stdout | default('')) }}"

- name: configure bpn hosts json files
  command: make BIN=browserpass-linux64 configure
  args:
    chdir: "{{pkg_dir}}/bpn/{{bpn_vsn}}/browserpass-linux64-{{bpn_vsn}}"
  when: bpn_needs_install

- name: install bpn
  become: true
  command: make BIN=browserpass-linux64 install
  args:
    chdir: "{{pkg_dir}}/bpn/{{bpn_vsn}}/browserpass-linux64-{{bpn_vsn}}"
  when: bpn_needs_install

# register the native host with the user's browser. these make targets
# symlink the manifest into $XDG_CONFIG_HOME, so they MUST run as
# gen_user (not root) or the symlinks land in /root/.config and Brave
# never finds them — leaving the popup stuck on "Loading available
# logins...". the policies-* target pre-approves the extension ID.

